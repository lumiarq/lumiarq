name: Neat

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  neat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Neat check
        id: neat_check
        continue-on-error: true
        run: pnpm lumis neat --check --dry --sarif --sarifOutput storage/framework/reports/neat-ci.sarif.json

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: storage/framework/reports/neat-ci.sarif.json

      - name: Fail if Neat reported errors
        if: steps.neat_check.outcome == 'failure'
        run: exit 1
